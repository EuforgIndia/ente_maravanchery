<!DOCTYPE html>
<html lang="ml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>എന്റെ മറവഞ്ചേരി</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Malayalam:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#07111A;--bg2:#0D1E2C;--bg3:#122436;
      --gold:#F5A623;--green:#2ECC71;--blue:#3498DB;--red:#E74C3C;
      --text:#ECF0F1;--muted:#7F8C8D;--border:rgba(255,255,255,.07);
      --r:16px;--nh:68px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%}
    body{font-family:'Noto Sans Malayalam','Segoe UI',sans-serif;background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;overflow-x:hidden;min-height:100vh}
    .screen{display:none;padding-bottom:calc(var(--nh) + 10px);min-height:100vh}
    .screen.active{display:block}

    /* NAV */
    .bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg2);border-top:1px solid var(--border);display:flex;height:var(--nh);z-index:100}
    .nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--muted);font-family:inherit;cursor:pointer;font-size:10px;padding:6px 0;transition:color .2s;position:relative}
    .nb.on{color:var(--gold)}
    .nb.on::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:36px;height:3px;background:var(--gold);border-radius:0 0 4px 4px}
    .ni{font-size:22px;line-height:1}

    /* HEADER */
    .ph{padding:48px 20px 16px;background:linear-gradient(180deg,var(--bg2),transparent);position:sticky;top:0;z-index:10;backdrop-filter:blur(10px)}
    .pt{font-size:24px;font-weight:900}
    .ps{font-size:12px;color:var(--muted);margin-top:2px}

    /* SEARCH */
    .sw{position:relative;padding:0 16px 14px}
    .si{position:absolute;left:28px;top:50%;transform:translateY(-58%);font-size:15px;pointer-events:none;color:var(--muted)}
    .sb{width:100%;padding:11px 14px 11px 42px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .2s}
    .sb:focus{border-color:var(--gold)}
    .sb::placeholder{color:var(--muted)}

    /* CAT GRID */
    .cg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 16px 4px}
    .cc{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:14px 6px 12px;text-align:center;cursor:pointer;transition:transform .15s}
    .cc:active{transform:scale(.94)}

    /* CARD */
    .card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin:0 14px 10px;border-left-width:3px}
    .cr{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
    .cb{flex:1;min-width:0}
    .cn{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cm{font-size:12px;color:var(--muted);margin-top:3px}
    .cbtn{background:rgba(46,204,113,.13);border:1px solid rgba(46,204,113,.3);color:var(--green);border-radius:10px;padding:8px 12px;font-size:12px;font-family:inherit;cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
    .tr{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);margin-top:5px}
    .sr{display:flex;align-items:center;gap:6px;margin-top:8px}
    .star{font-size:16px;cursor:pointer;transition:transform .1s;display:inline-block}
    .star:active{transform:scale(1.4)}
    .rl{font-size:11px;color:var(--muted)}

    /* TABS */
    .tabs{display:flex;gap:8px;padding:0 16px 14px;overflow-x:auto;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tbn{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-family:inherit;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
    .tbn.on{background:var(--gold);color:#000;border-color:var(--gold);font-weight:800}

    /* BUS */
    .btabs{display:flex;gap:8px;padding:0 16px 14px}
    .btab{flex:1;padding:10px 4px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s;line-height:1.5}
    .tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 14px 20px}
    .tc{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px 4px;text-align:center}
    .tc.past{opacity:.25}.tc.next{border-width:1.5px}
    .tv{font-size:17px;font-weight:800;font-family:monospace;letter-spacing:-.5px}
    .tap{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:1px;font-family:monospace}
    .ndot{width:6px;height:6px;border-radius:50%;margin:0 auto 4px}
    .nbanner{margin:0 14px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
    .nlbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;font-family:monospace}
    .nt{font-size:30px;font-weight:900;font-family:monospace;letter-spacing:-1px}
    .mbox{border-radius:10px;padding:8px 14px;text-align:center}
    .mv{font-size:24px;font-weight:900;font-family:monospace}
    .ml{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:1px}

    /* FORMS */
    .lkwrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:24px;text-align:center}
    .fwrap{padding:0 16px}
    .fg{margin-bottom:13px}
    .fl{font-size:12px;color:var(--muted);margin-bottom:5px;display:block;font-weight:600}
    .fi,.fsl{width:100%;padding:11px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .2s}
    .fi:focus,.fsl:focus{border-color:var(--gold)}
    .fsl option{background:#122436}
    .bprim{width:100%;padding:13px;background:var(--gold);color:#000;border:none;border-radius:12px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;transition:opacity .2s}
    .bprim:disabled{opacity:.5;cursor:not-allowed}
    .bsm{padding:6px 10px;border-radius:8px;font-family:inherit;font-size:12px;cursor:pointer;border:1px solid transparent}
    .bedit{background:rgba(52,152,219,.13);border-color:rgba(52,152,219,.3);color:var(--blue)}
    .bdel{background:rgba(231,76,60,.13);border-color:rgba(231,76,60,.3);color:var(--red)}
    .ebanner{background:rgba(52,152,219,.1);border:1px solid rgba(52,152,219,.3);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--blue);display:flex;justify-content:space-between;align-items:center}

    /* HERO */
    .hero{padding:52px 20px 18px;background:linear-gradient(160deg,#0D2035,#07111A);position:relative;overflow:hidden}
    .hero::before{content:'🌴';position:absolute;right:-10px;bottom:-10px;font-size:100px;opacity:.06;transform:rotate(-10deg);pointer-events:none}
    .htitle{font-size:27px;font-weight:900;color:var(--gold);line-height:1.2}
    .hsub{font-size:12px;color:var(--muted);margin-top:3px}
    .srow{display:flex;gap:8px;margin-top:14px}
    .sbox{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px 8px;text-align:center}
    .sv{font-size:22px;font-weight:900;color:var(--gold);font-family:monospace}
    .sl{font-size:10px;color:var(--muted);margin-top:1px}
    .stitle{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:14px 16px 10px}
    .empty{text-align:center;padding:40px 20px;color:var(--muted)}
    .rbadge{display:inline-flex;align-items:center;gap:3px;background:rgba(245,166,35,.13);border:1px solid rgba(245,166,35,.3);color:var(--gold);border-radius:8px;padding:2px 7px;font-size:11px;font-weight:700}
    .clk{font-size:13px;font-family:monospace;color:var(--muted);letter-spacing:1px}
    .div{height:1px;background:var(--border);margin:2px 14px 10px}

    /* TOAST */
    .toast{position:fixed;bottom:calc(var(--nh) + 14px);left:50%;transform:translateX(-50%);padding:9px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;white-space:nowrap;pointer-events:none;animation:tin .3s ease}
    .toast.ok{background:#2ECC71;color:#000}.toast.err{background:#E74C3C;color:#fff}
    @keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

    /* SPINNER */
    .spin{display:inline-block;width:18px;height:18px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle}
    @keyframes sp{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="s-home">
  <div class="hero">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div class="htitle">എന്റെ മറവഞ്ചേരി</div>
        <div class="hsub">നിങ്ങളുടെ നാടിന്റെ ഡിജിറ്റൽ ഡയറക്ടറി</div>
      </div>
      <div style="text-align:right">
        <div id="clk-home" class="clk"></div>
      </div>
    </div>
    <div class="srow" id="stats">
      <div class="sbox"><div class="sv">…</div><div class="sl">ആകെ ലിസ്റ്റിംഗ്</div></div>
      <div class="sbox"><div class="sv">…</div><div class="sl">വിഭാഗം</div></div>
      <div class="sbox"><div class="sv">…</div><div class="sl">റേറ്റിംഗ്</div></div>
    </div>
  </div>
  <div class="sw" style="padding:14px 16px">
    <span class="si">🔍</span>
    <input class="sb" type="search" placeholder="പേര്, ഫോൺ, പ്രദേശം…" id="homeSearch" oninput="if(window.gSearch)window.gSearch(this.value)">
  </div>
  <div id="gres" style="display:none"></div>
  <div id="hbody">
    <div class="stitle">വിഭാഗങ്ങൾ</div>
    <div class="cg" id="catgrid"></div>
    <div class="stitle">ടോപ്പ് റേറ്റഡ്</div>
    <div id="toprated"><div class="empty"><div style="font-size:32px">⏳</div><div style="font-size:13px;margin-top:6px">ലോഡ് ചെയ്യുന്നു…</div></div></div>
  </div>
</div>

<!-- DIRECTORY -->
<div class="screen" id="s-dir">
  <div class="ph"><div class="pt">ഡയറക്ടറി</div><div class="ps">സേവനദാതാക്കൾ & കടകൾ</div></div>
  <div class="tabs" id="dtabs"></div>
  <div class="sw"><span class="si">🔍</span><input class="sb" type="search" placeholder="തിരയുക…" id="dq" oninput="if(window.filterDir)window.filterDir(this.value)"></div>
  <div id="dlist"></div>
</div>

<!-- BUS -->
<div class="screen" id="s-bus">
  <div class="ph" style="display:flex;justify-content:space-between;align-items:center">
    <div><div class="pt">ബസ് സമയം</div><div class="ps">മറവഞ്ചേരി ടൈംടേബിൾ</div></div>
    <div id="clk-bus" class="clk"></div>
  </div>
  <div id="nba"></div>
  <div class="btabs" id="brtabs"></div>
  <div class="tgrid" id="tgrid"></div>
</div>

<!-- ADMIN -->
<div class="screen" id="s-admin"><div id="aroot"></div></div>

<!-- NAV -->
<nav class="bnav">
  <button class="nb on" onclick="if(window.nav)nav('home')"  id="n-home">  <span class="ni">🏠</span><span>ഹോം</span></button>
  <button class="nb"    onclick="if(window.nav)nav('dir')"   id="n-dir">   <span class="ni">📋</span><span>ഡയറക്ടറി</span></button>
  <button class="nb"    onclick="if(window.nav)nav('bus')"   id="n-bus">   <span class="ni">🚌</span><span>ബസ്</span></button>
  <button class="nb"    onclick="if(window.nav)nav('admin')" id="n-admin"> <span class="ni">⚙️</span><span>അഡ്മിൻ</span></button>
</nav>

<script>
// Global variables
let entries = [], adminIn = false, busR = 'kurippuram', dirTab = 'store', dirQ = '', editId = null;
let db = null, FS = null;

const PASS = 'Maravanchery@123';

const CATS = [
  {id:'store',       icon:'🏪',name:'കടകൾ',           col:'#F59E0B'},
  {id:'electrician', icon:'⚡',name:'ഇലക്ട്രീഷ്യൻ',  col:'#FBBF24'},
  {id:'plumber',     icon:'🔧',name:'പ്ലംബർ',         col:'#38BDF8'},
  {id:'coconut',     icon:'🥥',name:'തേങ്ങ പറിക്കൽ', col:'#84CC16'},
  {id:'carpenter',   icon:'🔨',name:'ആശാരി',          col:'#C084FC'},
  {id:'mason',       icon:'🧱',name:'മേസൻ',           col:'#FB923C'},
  {id:'painter',     icon:'🎨',name:'പെയിന്റർ',      col:'#F472B6'},
  {id:'driver',      icon:'🚗',name:'ഡ്രൈവർ / ഓട്ടോ',col:'#34D399'},
  {id:'authority',   icon:'🏛️',name:'അധികൃതർ',       col:'#60A5FA'},
  {id:'other',       icon:'🛠️',name:'മറ്റുള്ളവ',     col:'#94A3B8'},
];

const BUS = {
  kurippuram:{name:'കുറിപ്പുറം',col:'#F5A623',
    t:['6:45','7:00','7:15','8:05','8:35','9:15','9:20','9:35','10:10','10:30',
       '10:55','11:20','11:50','11:55','12:15','13:10','13:27','13:40','14:05',
       '14:12','14:25','14:40','14:55','15:20','15:40','16:20','16:40','16:50',
       '17:30','17:35','17:50','18:10','18:20','18:55']},
  edappal:{name:'എടപ്പാൾ',col:'#10B981',
    t:['6:55','7:45','8:30','8:55','9:10','10:15','10:25','10:45','11:19','11:45',
       '14:25','14:55','15:20','16:05','16:35','17:25','17:35','18:15','18:31','19:00']},
  ponnani:{name:'പൊന്നാനി',col:'#8B5CF6',
    t:['7:35','8:00','10:05','12:55','15:35','18:18']}
};

// Helper functions
function toast(msg, type='ok'){
  const el=document.createElement('div');
  el.className=`toast ${type}`;el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2500);
}

function avg(e){const r=e.ratings;return r?.length?r.reduce((a,b)=>a+b,0)/r.length:0;}

function pt(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function ft(t){const[h,m]=t.split(':').map(Number);return{t:`${h%12||12}:${String(m).padStart(2,'0')}`,p:h<12?'AM':'PM'};}

function tickClocks(){
  const t=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  ['clk-home','clk-bus'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=t;});
}

function card(e,rank=0){
  const c=CATS.find(x=>x.id===e.cat);
  const a=avg(e),cnt=(e.ratings||[]).length;
  const stars=[1,2,3,4,5].map(s=>`<span class="star" onclick="if(window.rate)rate('${e.id}',${s})">${s<=Math.round(a)?'⭐':'☆'}</span>`).join('');
  return `<div class="card" style="border-left-color:${c?.col||'#666'}">
    <div class="cr">
      <div class="cb">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <div class="cn">${c?.icon||''} ${e.name}</div>
          ${rank?`<span class="rbadge">#${rank} ⭐</span>`:''}
        </div>
        <div class="cm">${[e.area,e.desc].filter(Boolean).join(' · ')}</div>
        ${e.timing?`<div class="tr">🕐 ${e.timing}</div>`:''}
        <div class="sr"><div>${stars}</div><span class="rl">${a>0?a.toFixed(1)+' ('+cnt+' പേർ)':'റേറ്റ് ചെയ്യുക'}</span></div>
      </div>
      <a class="cbtn" href="tel:${e.phone}">📞<br>വിളിക്കുക</a>
    </div>
  </div>`;
}

// Firebase functions
async function startListener(){
  if(!db || !FS) return;
  const {onSnapshot,query,orderBy,collection} = FS;
  const q = query(collection(db,'entries'), orderBy('createdAt','asc'));
  onSnapshot(q, snap=>{
    entries = snap.docs.map(d=>({id:d.id,...d.data()}));
    const cur = document.querySelector('.screen.active')?.id?.replace('s-','');
    if(cur==='home') renderHome();
    if(cur==='dir'){renderDirTabs();filterDir(dirQ);}
    if(cur==='admin'&&adminIn) renderAList();
  }, (err)=>{
    console.error('Snapshot error:', err);
    toast('Data connection error', 'err');
  });
}

// Render functions
function renderHome(){
  const tot = entries.reduce((s,e)=>s+(e.ratings?.length||0),0);
  document.getElementById('stats').innerHTML=
    `<div class="sbox"><div class="sv">${entries.length}</div><div class="sl">ആകെ ലിസ്റ്റിംഗ്</div></div>
     <div class="sbox"><div class="sv">${[...new Set(entries.map(e=>e.cat))].length||0}</div><div class="sl">വിഭാഗം</div></div>
     <div class="sbox"><div class="sv">${tot}</div><div class="sl">റേറ്റിംഗ്</div></div>`;

  document.getElementById('catgrid').innerHTML = CATS.map(c=>{
    const n=entries.filter(e=>e.cat===c.id).length;
    return `<div class="cc" onclick="if(window.goCat)goCat('${c.id}')" style="${n?'border-color:'+c.col+'28':''}">
      <div style="font-size:26px;margin-bottom:5px">${c.icon}</div>
      <div style="font-size:11px;font-weight:700;line-height:1.3;color:${n?'#dde':'#566477'}">${c.name}</div>
      <div style="font-size:10px;color:var(--muted);margin-top:3px">${n} എൻട്രി</div></div>`;
  }).join('');

  const top = entries.map(e=>({...e,avg:avg(e)})).filter(e=>e.avg>0).sort((a,b)=>b.avg-a.avg).slice(0,5);
  document.getElementById('toprated').innerHTML = top.length
    ? top.map((e,i)=>card(e,i+1)).join('')
    : `<div class="empty"><div style="font-size:32px">⭐</div><div style="font-size:13px;margin-top:6px">ഇതുവരെ റേറ്റിംഗ് ഇല്ല</div><div style="font-size:11px;margin-top:4px">ഡയറക്ടറിയിൽ ആർക്കെങ്കിലും ആദ്യം റേറ്റ് ചെയ്യൂ</div></div>`;
}

function goCat(id){dirTab=id;nav('dir');}

function gSearch(q){
  const r=document.getElementById('gres'),b=document.getElementById('hbody');
  if(!q.trim()){r.style.display='none';b.style.display='block';return;}
  r.style.display='block';b.style.display='none';
  const f=entries.filter(e=>e.name?.includes(q)||e.phone?.includes(q)||(e.area||'').includes(q)||(e.desc||'').includes(q));
  r.innerHTML=`<div class="stitle">${f.length} ഫലം — "${q}"</div>`+(f.length?f.map(e=>card(e)).join(''):`<div class="empty"><div style="font-size:32px">🔍</div><div style="font-size:13px;margin-top:6px">ഒന്നും കണ്ടെത്തിയില്ല</div></div>`);
}

function renderDir(){renderDirTabs();filterDir(dirQ);}

function renderDirTabs(){
  document.getElementById('dtabs').innerHTML=CATS.map(c=>{
    const n=entries.filter(e=>e.cat===c.id).length;
    return `<button class="tbn${c.id===dirTab?' on':''}" onclick="if(window.setTab)setTab('${c.id}')">${c.icon} ${c.name} (${n})</button>`;
  }).join('');
}

function setTab(id){dirTab=id;dirQ='';const dq=document.getElementById('dq');if(dq)dq.value='';renderDir();}

function filterDir(q){
  dirQ=q;
  const list=entries.filter(e=>e.cat===dirTab&&(!q.trim()||e.name?.includes(q)||e.phone?.includes(q)||(e.area||'').includes(q)));
  const c=CATS.find(x=>x.id===dirTab);
  document.getElementById('dlist').innerHTML=list.length?list.map(e=>card(e)).join('')
    :`<div class="empty"><div style="font-size:32px">${c?.icon||'📋'}</div><div style="font-size:13px;margin-top:6px">${c?.name} ഒന്നും ഇല്ല</div><div style="font-size:11px;margin-top:4px">അഡ്മിൻ ആദ്യം ഇവിടെ ചേർക്കട്ടെ</div></div>`;
}

async function rate(id,stars){
  if(!db || !FS){toast('Please wait, loading...','err');return;}
  const e=entries.find(x=>x.id===id);if(!e)return;
  const updated=[...(e.ratings||[]),stars];
  try{
    await FS.updateDoc(FS.doc(db,'entries',id),{ratings:updated});
    toast('⭐ റേറ്റിംഗ് ചേർത്തു!','ok');
  }catch{toast('❌ റേറ്റ് ചെയ്യാൻ കഴിഞ്ഞില്ല','err');}
}

function renderBus(){
  const cur=new Date().getHours()*60+new Date().getMinutes();
  document.getElementById('brtabs').innerHTML=Object.entries(BUS).map(([k,v])=>
    `<button class="btab${k===busR?' active':''}" onclick="if(window.setBus)setBus('${k}')"
      style="${k===busR?'color:'+v.col+';border-color:'+v.col+'50;background:'+v.col+'12':''}">
      ${v.name}</button>`
  ).join('');
  const r=BUS[busR],ni=r.t.findIndex(t=>pt(t)>cur),nb=ni!==-1?r.t[ni]:null,nm=nb?pt(nb)-cur:null;
  if(nb){
    const{t,p}=ft(nb);
    document.getElementById('nba').innerHTML=`<div class="nbanner" style="border-color:${r.col}30">
      <div>
        <div class="nlbl" style="color:${r.col}">▶ അടുത്ത ബസ്</div>
        <div class="nt" style="color:${r.col}">${t} <span style="font-size:14px;font-weight:400;color:#666">${p}</span></div>
        <div style="font-size:11px;color:#556;margin-top:2px">${r.name} ഭാഗം</div>
      </div>
      <div class="mbox" style="background:${r.col}18;border:1px solid ${r.col}40">
        <div class="mv" style="color:${r.col}">${nm}</div><div class="ml">മിനിറ്റ്</div>
      </div></div>`;
  } else {
    document.getElementById('nba').innerHTML=`<div style="margin:0 14px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;color:var(--muted);font-size:13px">🌙 ഇന്ന് ഇനി ബസ് ഇല്ല</div>`;
  }
  document.getElementById('tgrid').innerHTML=r.t.map(t=>{
    const past=pt(t)<cur,isN=t===nb;const{t:tv,p}=ft(t);
    return `<div class="tc${past?' past':''}${isN?' next':''}">
      ${isN?`<div class="ndot" style="background:${r.col};box-shadow:0 0 6px ${r.col}"></div>`:''}
      <div class="tv" style="${isN?'color:'+r.col:''}">${tv}</div><div class="tap">${p}</div></div>`;
  }).join('');
}
function setBus(k){busR=k;renderBus();}

function nav(s){
  document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(x=>x.classList.remove('on'));
  document.getElementById('s-'+s).classList.add('active');
  document.getElementById('n-'+s).classList.add('on');
  if(s==='home') renderHome();
  if(s==='dir') renderDir();
  if(s==='bus') renderBus();
  if(s==='admin') renderAdmin();
}

function renderAdmin(){adminIn?renderPanel():renderLock();}

function renderLock(){
  document.getElementById('aroot').innerHTML=`
    <div class="lkwrap">
      <div style="font-size:56px;margin-bottom:14px">🔐</div>
      <div style="font-size:20px;font-weight:800;margin-bottom:6px">അഡ്മിൻ ലോഗിൻ</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6">ഈ വിഭാഗം കൈകാര്യം ചെയ്യാൻ<br>പാസ്‌വേഡ് നൽകുക</div>
      <div style="width:100%;max-width:300px">
        <input type="password" class="fi" id="pinp" placeholder="••••••••••"
          style="text-align:center;letter-spacing:4px;margin-bottom:10px"
          onkeydown="if(event.key==='Enter')doLogin()">
        <button class="bprim" onclick="doLogin()">ലോഗിൻ ചെയ്യുക</button>
        <div style="color:var(--red);font-size:12px;text-align:center;margin-top:8px;min-height:18px" id="perr"></div>
      </div>
    </div>`;
}

function doLogin(){
  if(document.getElementById('pinp').value===PASS){adminIn=true;renderPanel();}
  else document.getElementById('perr').textContent='❌ തെറ്റായ പാസ്‌വേഡ്';
}

function renderPanel(){
  document.getElementById('aroot').innerHTML=`
    <div class="ph" style="display:flex;justify-content:space-between;align-items:center">
      <div><div class="pt">അഡ്മിൻ</div><div class="ps">ലിസ്റ്റിംഗ് ചേർക്കുക / തിരുത്തുക</div></div>
      <button onclick="doLogout()" style="background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.3);color:#E74C3C;padding:6px 12px;border-radius:8px;font-family:inherit;font-size:12px;cursor:pointer">ലോഗൗട്ട്</button>
    </div>
    <div class="fwrap">
      <div id="ebanner" class="ebanner" style="display:none">
        ✏️ <span>എഡിറ്റ് മോഡ്</span>
        <button onclick="cancelEdit()" style="background:none;border:none;color:var(--red);font-family:inherit;font-size:12px;cursor:pointer">❌ റദ്ദാക്കുക</button>
      </div>
      <div class="fg"><label class="fl">പേര് *</label><input type="text" class="fi" id="fn" placeholder="ഉദാ: രാജൻ ഇലക്ട്രിക്കൽ"></div>
      <div class="fg"><label class="fl">ഫോൺ നമ്പർ *</label><input type="tel" class="fi" id="fp" placeholder="ഉദാ: 9400000000"></div>
      <div class="fg"><label class="fl">വിഭാഗം *</label>
        <select class="fsl" id="fc">${CATS.map(c=>`<option value="${c.id}">${c.icon} ${c.name}</option>`).join('')}</select>
      </div>
      <div class="fg"><label class="fl">പ്രദേശം</label><input type="text" class="fi" id="fa" placeholder="ഉദാ: മറവഞ്ചേരി"></div>
      <div class="fg"><label class="fl">വിവരണം</label><input type="text" class="fi" id="fd" placeholder="ഉദാ: 10 വർഷം പരിചയം"></div>
      <div class="fg"><label class="fl">സമയം <span style="font-size:10px;color:var(--muted)">(കടകൾക്ക്)</span></label><input type="text" class="fi" id="ft2" placeholder="ഉദാ: 8AM – 9PM"></div>
      <button class="bprim" onclick="saveEntry()" id="sbtn">+ ചേർക്കുക</button>
      <div style="height:16px"></div>
    </div>
    <div class="div"></div>
    <div class="stitle" id="altitle">ചേർത്ത ലിസ്റ്റിംഗ് (${entries.length})</div>
    <div id="alist"></div>`;
  renderAList();
}

function renderAList(){
  const el=document.getElementById('alist'),tl=document.getElementById('altitle');
  if(!el)return;if(tl)tl.textContent=`ചേർത്ത ലിസ്റ്റിംഗ് (${entries.length})`;
  if(!entries.length){el.innerHTML='<div class="empty"><div style="font-size:32px">📋</div><div style="font-size:13px;margin-top:6px">ഒന്നും ചേർത്തിട്ടില്ല</div></div>';return;}
  el.innerHTML=entries.map(e=>{
    const c=CATS.find(x=>x.id===e.cat);
    return `<div class="card" style="border-left-color:${c?.col||'#666'}">
      <div class="cr">
        <div class="cb">
          <div class="cn">${c?.icon||''} ${e.name}</div>
          <div class="cm">${c?.name||''} · ${e.phone}</div>
          ${e.area?`<div style="font-size:11px;color:#556;margin-top:2px">${e.area}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <button class="bsm bedit" onclick="editEntry('${e.id}')">✏️ തിരുത്ത്</button>
          <button class="bsm bdel"  onclick="delEntry('${e.id}')">🗑️ ഡിലീറ്റ്</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function saveEntry(){
  if(!db || !FS){toast('Please wait, loading...','err');return;}
  const name=document.getElementById('fn').value.trim();
  const phone=document.getElementById('fp').value.trim();
  const cat=document.getElementById('fc').value;
  const area=document.getElementById('fa').value.trim();
  const desc=document.getElementById('fd').value.trim();
  const timing=document.getElementById('ft2').value.trim();
  if(!name||!phone){toast('⚠️ പേരും ഫോണും നൽകണം','err');return;}
  const btn=document.getElementById('sbtn');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  try{
    if(editId){
      await FS.updateDoc(FS.doc(db,'entries',editId),{name,phone,cat,area,desc,timing});
      toast('✅ അപ്ഡേറ്റ് ചെയ്തു','ok');cancelEdit();
    } else {
      await FS.addDoc(FS.collection(db,'entries'),
        {name,phone,cat,area,desc,timing,ratings:[],createdAt:FS.serverTimestamp()});
      toast('✅ ചേർത്തു','ok');clearForm();
    }
  }catch(e){toast('❌ '+e.message,'err');}
  btn.disabled=false;
  btn.textContent=editId?'✅ അപ്ഡേറ്റ് ചെയ്യുക':'+ ചേർക്കുക';
}

function editEntry(id){
  const e=entries.find(x=>x.id===id);if(!e)return;
  editId=id;
  document.getElementById('fn').value=e.name||'';
  document.getElementById('fp').value=e.phone||'';
  document.getElementById('fc').value=e.cat||'store';
  document.getElementById('fa').value=e.area||'';
  document.getElementById('fd').value=e.desc||'';
  document.getElementById('ft2').value=e.timing||'';
  document.getElementById('ebanner').style.display='flex';
  document.getElementById('sbtn').textContent='✅ അപ്ഡേറ്റ് ചെയ്യുക';
  window.scrollTo({top:0,behavior:'smooth'});
}

function cancelEdit(){
  editId=null;
  document.getElementById('ebanner').style.display='none';
  document.getElementById('sbtn').textContent='+ ചേർക്കുക';
  clearForm();
}

function clearForm(){
  ['fn','fp','fa','fd','ft2'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
}

async function delEntry(id){
  if(!confirm('ഈ ലിസ്റ്റിംഗ് ഡിലീറ്റ് ചെയ്യണോ?'))return;
  try{
    await FS.deleteDoc(FS.doc(db,'entries',id));
    toast('🗑️ ഡിലീറ്റ് ചെയ്തു','ok');
  }catch{toast('❌ ഡിലീറ്റ് ചെയ്യാൻ കഴിഞ്ഞില്ല','err');}
}

function doLogout(){adminIn=false;renderLock();}

async function initFirebase() {
  try {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp } = 
      await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");

    const cfg = {
      apiKey: "AIzaSyDd7k11dyoaRBEq6jnDGUbWw3KlrTXNwhY",
      authDomain: "ente-maravanchery.firebaseapp.com",
      projectId: "ente-maravanchery",
      storageBucket: "ente-maravanchery.firebasestorage.app",
      messagingSenderId: "859930472254",
      appId: "1:859930472254:web:023d69985dd64f7fb2466f",
      measurementId: "G-CYH8DH2JY4"
    };
    
    const app = initializeApp(cfg);
    db = getFirestore(app);
    FS = { collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp };
    
    // Expose necessary functions to window
    window.nav = nav;
    window.gSearch = gSearch;
    window.filterDir = filterDir;
    window.setTab = setTab;
    window.goCat = goCat;
    window.rate = rate;
    window.setBus = setBus;
    
    startListener();
    tickClocks();
    setInterval(tickClocks,1000);
    setInterval(()=>{if(document.getElementById('s-bus').classList.contains('active'))renderBus();},30000);
  } catch (error) {
    console.error('Firebase initialization error:', error);
    toast('Connection failed. Please refresh.', 'err');
  }
}

// Start the app
initFirebase();
</script>
