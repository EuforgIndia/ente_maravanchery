<!DOCTYPE html>
<html lang="ml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>എന്റെ മറവഞ്ചേരി</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Malayalam:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --bg:#07111A;--bg2:#0D1E2C;--bg3:#122436;--bg4:#172D40;
      --gold:#F5A623;--green:#2ECC71;--blue:#3498DB;--red:#E74C3C;
      --text:#ECF0F1;--muted:#7F8C8D;--border:rgba(255,255,255,0.07);
      --radius:16px;--nav-h:68px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%}
    body{font-family:'Noto Sans Malayalam','Segoe UI',sans-serif;background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;overflow-x:hidden;min-height:100vh}

    .screen{display:none;padding-bottom:calc(var(--nav-h) + 10px);min-height:100vh}
    .screen.active{display:block}

    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg2);border-top:1px solid var(--border);display:flex;height:var(--nav-h);z-index:100;padding-bottom:env(safe-area-inset-bottom,0px)}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--muted);font-family:inherit;cursor:pointer;font-size:10px;padding:6px 0;transition:color .2s;position:relative}
    .nav-btn.active{color:var(--gold)}
    .nav-btn.active::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:36px;height:3px;background:var(--gold);border-radius:0 0 4px 4px}
    .nav-icon{font-size:22px;line-height:1}

    .page-header{padding:48px 20px 14px;background:linear-gradient(180deg,var(--bg2) 0%,transparent 100%);position:sticky;top:0;z-index:10;backdrop-filter:blur(10px)}
    .page-title{font-size:24px;font-weight:900}
    .page-sub{font-size:12px;color:var(--muted);margin-top:2px}

    .search-wrap{position:relative;padding:0 16px 14px}
    .search-icon{position:absolute;left:28px;top:50%;transform:translateY(-58%);font-size:15px;pointer-events:none;color:var(--muted)}
    .search-box{width:100%;padding:11px 14px 11px 42px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .2s}
    .search-box:focus{border-color:var(--gold)}
    .search-box::placeholder{color:var(--muted)}

    .cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 16px 4px}
    .cat-card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:14px 6px 12px;text-align:center;cursor:pointer;transition:transform .15s}
    .cat-card:active{transform:scale(0.94)}
    .cat-icon{font-size:26px;margin-bottom:5px;line-height:1}
    .cat-name{font-size:11px;font-weight:700;line-height:1.3}
    .cat-count{font-size:10px;color:var(--muted);margin-top:3px}

    .card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin:0 14px 10px;border-left-width:3px}
    .card-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
    .card-body{flex:1;min-width:0}
    .card-name{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-meta{font-size:12px;color:var(--muted);margin-top:3px}
    .call-btn{background:rgba(46,204,113,.13);border:1px solid rgba(46,204,113,.3);color:var(--green);border-radius:10px;padding:8px 12px;font-size:12px;font-family:inherit;cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
    .timing-row{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);margin-top:5px}

    .stars-row{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
    .star{font-size:18px;cursor:pointer;transition:transform .1s;display:inline-block}
    .star:active{transform:scale(1.4)}
    .rating-label{font-size:11px;color:var(--muted)}

    .tabs{display:flex;gap:8px;padding:0 16px 14px;overflow-x:auto;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tab-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-family:inherit;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
    .tab-btn.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:800}

    .bus-tabs{display:flex;gap:8px;padding:0 16px 14px}
    .bus-tab{flex:1;padding:10px 4px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s;line-height:1.5}
    .time-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 14px 20px}
    .time-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px 4px;text-align:center}
    .time-card.past{opacity:.25}
    .time-card.next{border-width:1.5px}
    .time-val{font-size:17px;font-weight:800;font-family:monospace;letter-spacing:-.5px}
    .time-ap{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:1px;font-family:monospace}
    .next-dot{width:6px;height:6px;border-radius:50%;margin:0 auto 4px}
    .next-banner{margin:0 14px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
    .next-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;font-family:monospace}
    .next-t{font-size:30px;font-weight:900;font-family:monospace;letter-spacing:-1px}
    .mins-box{border-radius:10px;padding:8px 14px;text-align:center}
    .mins-val{font-size:24px;font-weight:900;font-family:monospace}
    .mins-lbl{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:1px}

    .lock-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:24px;text-align:center}
    .lock-icon{font-size:56px;margin-bottom:14px}
    .lock-title{font-size:20px;font-weight:800;margin-bottom:6px}
    .lock-sub{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6}
    .form-wrap{padding:0 16px}
    .form-group{margin-bottom:13px}
    .form-lbl{font-size:12px;color:var(--muted);margin-bottom:5px;display:block;font-weight:600}
    .form-inp,.form-sel{width:100%;padding:11px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .2s}
    .form-inp:focus,.form-sel:focus{border-color:var(--gold)}
    .form-sel option{background:#122436}
    .btn-primary{width:100%;padding:13px;background:var(--gold);color:#000;border:none;border-radius:12px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;transition:opacity .2s}
    .btn-primary:active{opacity:.8}
    .btn-sm{padding:6px 10px;border-radius:8px;font-family:inherit;font-size:12px;cursor:pointer;border:1px solid transparent}
    .btn-edit{background:rgba(52,152,219,.13);border-color:rgba(52,152,219,.3);color:var(--blue)}
    .btn-del{background:rgba(231,76,60,.13);border-color:rgba(231,76,60,.3);color:var(--red)}
    .edit-banner{background:rgba(52,152,219,.1);border:1px solid rgba(52,152,219,.3);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--blue);display:flex;justify-content:space-between;align-items:center}

    .hero{padding:52px 20px 18px;background:linear-gradient(160deg,#0D2035 0%,#07111A 60%);position:relative;overflow:hidden}
    .hero::before{content:'🌴';position:absolute;right:-10px;bottom:-10px;font-size:100px;opacity:.06;transform:rotate(-10deg);pointer-events:none}
    .hero-title{font-size:27px;font-weight:900;color:var(--gold);line-height:1.2}
    .hero-sub{font-size:12px;color:var(--muted);margin-top:3px}
    .stats-row{display:flex;gap:8px;margin-top:14px}
    .stat-box{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px 8px;text-align:center}
    .stat-val{font-size:22px;font-weight:900;color:var(--gold);font-family:monospace}
    .stat-lbl{font-size:10px;color:var(--muted);margin-top:1px}

    .sec-title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:14px 16px 10px}
    .rank-badge{display:inline-flex;align-items:center;gap:3px;background:rgba(245,166,35,.13);border:1px solid rgba(245,166,35,.3);color:var(--gold);border-radius:8px;padding:2px 7px;font-size:11px;font-weight:700}
    .header-clock{font-size:13px;font-family:monospace;color:var(--muted);letter-spacing:1px}
    .div{height:1px;background:var(--border);margin:2px 14px 10px}
    .empty{text-align:center;padding:40px 20px;color:var(--muted)}
    .empty-icon{font-size:38px;margin-bottom:8px}
    .empty-text{font-size:14px}
    .empty-hint{font-size:11px;margin-top:4px}
    .err-txt{color:var(--red);font-size:12px;text-align:center;margin-top:8px;min-height:18px}
    .loading{text-align:center;padding:40px 20px;color:var(--muted)}
    .spinner{width:32px;height:32px;border:3px solid var(--bg3);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .toast{position:fixed;bottom:calc(var(--nav-h) + 14px);left:50%;transform:translateX(-50%);background:#2ECC71;color:#000;padding:9px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;white-space:nowrap;animation:toastIn .3s ease;pointer-events:none}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

    /* Firebase status badge */
    .fb-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,152,0,.1);border:1px solid rgba(255,152,0,.3);border-radius:6px;padding:2px 8px;font-size:10px;color:#FFA500;margin-top:6px}
    .fb-dot{width:6px;height:6px;border-radius:50%;background:#FFA500;animation:pulse 1.5s ease-in-out infinite}
    .fb-dot.on{background:#2ECC71;animation:none}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  </style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div class="hero">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div class="hero-title">എന്റെ മറവഞ്ചേരി</div>
        <div class="hero-sub">നിങ്ങളുടെ നാടിന്റെ ഡിജിറ്റൽ ഡയറക്ടറി</div>
        <div class="fb-badge"><span class="fb-dot" id="fb-dot"></span><span id="fb-status">Firebase കണക്ട് ആകുന്നു...</span></div>
      </div>
      <div id="home-clock" class="header-clock"></div>
    </div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val" id="s-total">—</div><div class="stat-lbl">ലിസ്റ്റിംഗ്</div></div>
      <div class="stat-box"><div class="stat-val" id="s-cats">—</div><div class="stat-lbl">വിഭാഗം</div></div>
      <div class="stat-box"><div class="stat-val" id="s-rated">—</div><div class="stat-lbl">റേറ്റഡ്</div></div>
    </div>
  </div>

  <div class="search-wrap" style="padding:14px 16px">
    <span class="search-icon">🔍</span>
    <input class="search-box" type="search" placeholder="പേര്, ഫോൺ, പ്രദേശം..." id="global-search" oninput="globalSearch(this.value)">
  </div>
  <div id="search-results" style="display:none"></div>
  <div id="home-body">
    <div class="sec-title">വിഭാഗങ്ങൾ</div>
    <div class="cat-grid" id="home-cat-grid"></div>
    <div class="sec-title">ടോപ്പ് റേറ്റഡ്</div>
    <div id="top-rated"><div class="loading"><div class="spinner"></div>ലോഡ് ചെയ്യുന്നു...</div></div>
  </div>
</div>

<!-- DIRECTORY -->
<div class="screen" id="screen-directory">
  <div class="page-header">
    <div class="page-title">ഡയറക്ടറി</div>
    <div class="page-sub">സേവനദാതാക്കൾ & കടകൾ</div>
  </div>
  <div class="tabs" id="dir-tabs"></div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-box" type="search" placeholder="തിരയുക..." id="dir-search" oninput="filterDir(this.value)">
  </div>
  <div id="dir-list"></div>
</div>

<!-- BUS -->
<div class="screen" id="screen-bus">
  <div class="page-header">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div><div class="page-title">ബസ് സമയം</div><div class="page-sub">മറവഞ്ചേരി ടൈംടേബിൾ</div></div>
      <div id="bus-clock" class="header-clock"></div>
    </div>
  </div>
  <div id="next-bus-area"></div>
  <div class="bus-tabs" id="bus-route-tabs"></div>
  <div class="time-grid" id="time-grid"></div>
</div>

<!-- ADMIN -->
<div class="screen" id="screen-admin">
  <div id="admin-root"></div>
</div>

<!-- NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="nav('home')"      id="nav-home">     <span class="nav-icon">🏠</span><span>ഹോം</span></button>
  <button class="nav-btn"        onclick="nav('directory')" id="nav-directory"><span class="nav-icon">📋</span><span>ഡയറക്ടറി</span></button>
  <button class="nav-btn"        onclick="nav('bus')"       id="nav-bus">      <span class="nav-icon">🚌</span><span>ബസ്</span></button>
  <button class="nav-btn"        onclick="nav('admin')"     id="nav-admin">    <span class="nav-icon">⚙️</span><span>അഡ്മിൻ</span></button>
</nav>

<script>
// ══════════════════════════════════════════
//  FIREBASE
// ══════════════════════════════════════════
firebase.initializeApp({
  apiKey:"AIzaSyDd7k11dyoaRBEq6jnDGUbWw3KlrTXNwhY",
  authDomain:"ente-maravanchery.firebaseapp.com",
  projectId:"ente-maravanchery",
  storageBucket:"ente-maravanchery.firebasestorage.app",
  messagingSenderId:"859930472254",
  appId:"1:859930472254:web:023d69985dd64f7fb2466f"
});
const db  = firebase.firestore();
const COL = db.collection('entries');

// ══════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════
const ADMIN_PASS = 'Maravanchery@123';

const CATS = [
  {id:'store',       icon:'🏪',name:'കടകൾ',           color:'#F59E0B'},
  {id:'electrician', icon:'⚡',name:'ഇലക്ട്രീഷ്യൻ',  color:'#FBBF24'},
  {id:'plumber',     icon:'🔧',name:'പ്ലംബർ',         color:'#38BDF8'},
  {id:'coconut',     icon:'🥥',name:'തേങ്ങ പറിക്കൽ', color:'#84CC16'},
  {id:'carpenter',   icon:'🔨',name:'ആശാരി',          color:'#C084FC'},
  {id:'mason',       icon:'🧱',name:'മേസൻ',           color:'#FB923C'},
  {id:'painter',     icon:'🎨',name:'പെയിന്റർ',      color:'#F472B6'},
  {id:'driver',      icon:'🚗',name:'ഡ്രൈവർ/ഓട്ടോ',  color:'#34D399'},
  {id:'authority',   icon:'🏛️',name:'അധികൃതർ',       color:'#60A5FA'},
  {id:'other',       icon:'🛠️',name:'മറ്റുള്ളവ',     color:'#94A3B8'},
];

const BUS = {
  kurippuram:{name:'കുറിപ്പുറം',color:'#F5A623',
    times:['6:45','7:00','7:15','8:05','8:35','9:15','9:20','9:35','10:10','10:30',
           '10:55','11:20','11:50','11:55','12:15','13:10','13:27','13:40','14:05',
           '14:12','14:25','14:40','14:55','15:20','15:40','16:20','16:40','16:50',
           '17:30','17:35','17:50','18:10','18:20','18:55']},
  edappal:{name:'എടപ്പാൾ',color:'#10B981',
    times:['6:55','7:45','8:30','8:55','9:10','10:15','10:25','10:45','11:19','11:45',
           '14:25','14:55','15:20','16:05','16:35','17:25','17:35','18:15','18:31','19:00']},
  ponnani:{name:'പൊന്നാനി',color:'#8B5CF6',
    times:['7:35','8:00','10:05','12:55','15:35','18:18']}
};

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let entries  = [];
let adminIn  = false;
let busRoute = 'kurippuram';
let dirTab   = 'store';
let dirQ     = '';
let editId   = null;

// ══════════════════════════════════════════
//  REALTIME LISTENER  ← heart of the app
// ══════════════════════════════════════════
COL.orderBy('createdAt','desc').onSnapshot(snap => {
  entries = snap.docs.map(d=>({id:d.id,...d.data()}));
  // Firebase connected
  const dot=document.getElementById('fb-dot');
  const st=document.getElementById('fb-status');
  if(dot){dot.classList.add('on');st.textContent='Firebase കണക്ടഡ് ✓';}
  refreshAll();
}, err => {
  console.error(err);
  const dot=document.getElementById('fb-dot');
  const st=document.getElementById('fb-status');
  if(dot){dot.style.background='#E74C3C';st.textContent='കണക്ഷൻ പരാജയം ❌';}
});

function refreshAll() {
  updateStats();
  const active = document.querySelector('.screen.active')?.id;
  if(active==='screen-home')      renderHome();
  if(active==='screen-directory') renderDir();
  if(active==='screen-admin' && adminIn) renderAdminList();
}

function updateStats() {
  document.getElementById('s-total').textContent = entries.length;
  document.getElementById('s-cats').textContent  = [...new Set(entries.map(e=>e.cat))].length||0;
  document.getElementById('s-rated').textContent = entries.filter(e=>(e.ratings||[]).length>0).length;
}

// ══════════════════════════════════════════
//  CLOCK
// ══════════════════════════════════════════
setInterval(()=>{
  const t=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  ['home-clock','bus-clock'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t;});
},1000);
setInterval(()=>{if(document.getElementById('screen-bus').classList.contains('active'))renderBus();},30000);

// ══════════════════════════════════════════
//  NAV
// ══════════════════════════════════════════
function nav(s){
  document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
  document.getElementById('screen-'+s).classList.add('active');
  document.getElementById('nav-'+s).classList.add('active');
  ({home:renderHome,directory:renderDir,bus:renderBus,admin:renderAdmin})[s]();
}

// ══════════════════════════════════════════
//  HOME
// ══════════════════════════════════════════
function renderHome(){
  updateStats();
  document.getElementById('home-cat-grid').innerHTML=CATS.map(c=>{
    const n=entries.filter(e=>e.cat===c.id).length;
    return `<div class="cat-card" onclick="goToCat('${c.id}')" style="${n?'border-color:'+c.color+'28':''}">
      <div class="cat-icon">${c.icon}</div>
      <div class="cat-name" style="color:${n?'#dde':'#566477'}">${c.name}</div>
      <div class="cat-count">${n} എൻട്രി</div>
    </div>`;
  }).join('');

  const top=[...entries].map(e=>({...e,avg:avgRating(e)})).filter(e=>e.avg>0).sort((a,b)=>b.avg-a.avg).slice(0,5);
  document.getElementById('top-rated').innerHTML=top.length
    ?top.map((e,i)=>entryCard(e,i+1)).join('')
    :`<div class="empty"><div class="empty-icon">⭐</div><div class="empty-text">ഇതുവരെ റേറ്റിംഗ് ഇല്ല</div><div class="empty-hint">ഡയറക്ടറിയിൽ നിന്ന് ആർക്കെങ്കിലും ആദ്യം റേറ്റ് ചെയ്യൂ</div></div>`;
}

function goToCat(id){dirTab=id;nav('directory');}

// ══════════════════════════════════════════
//  GLOBAL SEARCH
// ══════════════════════════════════════════
function globalSearch(q){
  const res=document.getElementById('search-results');
  const body=document.getElementById('home-body');
  if(!q.trim()){res.style.display='none';body.style.display='block';return;}
  res.style.display='block';body.style.display='none';
  const found=entries.filter(e=>(e.name||'').includes(q)||(e.phone||'').includes(q)||(e.area||'').includes(q)||(e.desc||'').includes(q));
  res.innerHTML=`<div class="sec-title">${found.length} ഫലം</div>`+(found.length?found.map(e=>entryCard(e)).join(''):`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">ഒന്നും കണ്ടെത്തിയില്ല</div></div>`);
}

// ══════════════════════════════════════════
//  DIRECTORY
// ══════════════════════════════════════════
function renderDir(){
  document.getElementById('dir-tabs').innerHTML=CATS.map(c=>{
    const n=entries.filter(e=>e.cat===c.id).length;
    return `<button class="tab-btn${c.id===dirTab?' active':''}" onclick="setTab('${c.id}')">${c.icon} ${c.name} (${n})</button>`;
  }).join('');
  filterDir(dirQ);
}
function setTab(id){dirTab=id;dirQ='';document.getElementById('dir-search').value='';renderDir();}
function filterDir(q){
  dirQ=q;
  const cat=CATS.find(c=>c.id===dirTab);
  const list=entries.filter(e=>e.cat===dirTab&&(!q.trim()||(e.name||'').includes(q)||(e.phone||'').includes(q)||(e.area||'').includes(q)));
  document.getElementById('dir-list').innerHTML=list.length?list.map(e=>entryCard(e)).join('')
    :`<div class="empty"><div class="empty-icon">${cat?.icon||'📋'}</div><div class="empty-text">${cat?.name||''} ഒന്നും ഇല്ല</div><div class="empty-hint">അഡ്മിൻ ആദ്യം ഇവിടെ ചേർക്കട്ടെ</div></div>`;
}

// ══════════════════════════════════════════
//  ENTRY CARD
// ══════════════════════════════════════════
function avgRating(e){const r=e.ratings||[];return r.length?r.reduce((a,b)=>a+b,0)/r.length:0;}

function entryCard(e,rank=0){
  const cat=CATS.find(c=>c.id===e.cat);
  const avg=avgRating(e),cnt=(e.ratings||[]).length;
  const stars=[1,2,3,4,5].map(s=>`<span class="star" onclick="rate('${e.id}',${s})">${s<=Math.round(avg)?'⭐':'☆'}</span>`).join('');
  return `<div class="card" style="border-left-color:${cat?.color||'#666'}">
    <div class="card-row">
      <div class="card-body">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <div class="card-name">${cat?.icon||''} ${e.name}</div>
          ${rank?`<span class="rank-badge">#${rank} ⭐</span>`:''}
        </div>
        <div class="card-meta">${[e.area,e.desc].filter(Boolean).join(' · ')}</div>
        ${e.timing?`<div class="timing-row">🕐 ${e.timing}</div>`:''}
        <div class="stars-row"><div>${stars}</div><span class="rating-label">${avg>0?avg.toFixed(1)+' ('+cnt+' പേർ)':'റേറ്റ് ചെയ്യുക'}</span></div>
      </div>
      <a class="call-btn" href="tel:${e.phone}">📞<br><span style="font-size:10px">വിളി</span></a>
    </div>
  </div>`;
}

// ══════════════════════════════════════════
//  RATE — saved to Firestore
// ══════════════════════════════════════════
async function rate(id,stars){
  try{
    const ref=COL.doc(id);
    const snap=await ref.get();
    if(!snap.exists)return;
    const curr=snap.data().ratings||[];
    await ref.update({ratings:[...curr,stars]});
    toast('⭐ റേറ്റിംഗ് ചേർത്തു!');
  }catch(e){toast('❌ പിശക് വന്നു');console.error(e);}
}

// ══════════════════════════════════════════
//  BUS
// ══════════════════════════════════════════
function pt(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function ft(t){const[h,m]=t.split(':').map(Number);return{t:`${h%12||12}:${String(m).padStart(2,'0')}`,p:h<12?'AM':'PM'};}

function renderBus(){
  const cur=new Date().getHours()*60+new Date().getMinutes();
  document.getElementById('bus-route-tabs').innerHTML=Object.entries(BUS).map(([k,v])=>
    `<button class="bus-tab${k===busRoute?' active':''}" onclick="setBusRoute('${k}')"
      style="${k===busRoute?'color:'+v.color+';border-color:'+v.color+'50;background:'+v.color+'12':''}">
      ${v.name}
    </button>`).join('');

  const route=BUS[busRoute];
  const ni=route.times.findIndex(t=>pt(t)>cur);
  const nb=ni!==-1?route.times[ni]:null,nm=nb?pt(nb)-cur:null;

  document.getElementById('next-bus-area').innerHTML=nb?(()=>{
    const{t,p}=ft(nb);
    return`<div class="next-banner" style="border-color:${route.color}30">
      <div>
        <div class="next-lbl" style="color:${route.color}">▶ അടുത്ത ബസ്</div>
        <div class="next-t" style="color:${route.color}">${t} <span style="font-size:14px;font-weight:400;color:#556">${p}</span></div>
        <div style="font-size:11px;color:#556;margin-top:2px">${route.name} ഭാഗം</div>
      </div>
      <div class="mins-box" style="background:${route.color}18;border:1px solid ${route.color}40">
        <div class="mins-val" style="color:${route.color}">${nm}</div>
        <div class="mins-lbl">മിനിറ്റ്</div>
      </div>
    </div>`;
  })():`<div style="margin:0 14px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;color:var(--muted);font-size:13px">🌙 ഇന്ന് ഇനി ബസ് ഇല്ല</div>`;

  document.getElementById('time-grid').innerHTML=route.times.map(t=>{
    const past=pt(t)<cur,isNext=t===nb;const{t:tv,p}=ft(t);
    return`<div class="time-card${past?' past':''}${isNext?' next':''}">
      ${isNext?`<div class="next-dot" style="background:${route.color};box-shadow:0 0 6px ${route.color}"></div>`:''}
      <div class="time-val" style="${isNext?'color:'+route.color:''}">${tv}</div>
      <div class="time-ap">${p}</div>
    </div>`;}).join('');
}
function setBusRoute(k){busRoute=k;renderBus();}

// ══════════════════════════════════════════
//  ADMIN
// ══════════════════════════════════════════
function renderAdmin(){adminIn?renderPanel():renderLock();}

function renderLock(){
  document.getElementById('admin-root').innerHTML=`
    <div class="lock-wrap">
      <div class="lock-icon">🔐</div>
      <div class="lock-title">അഡ്മിൻ ലോഗിൻ</div>
      <div class="lock-sub">ഈ വിഭാഗം കൈകാര്യം ചെയ്യാൻ<br>പാസ്‌വേഡ് നൽകുക</div>
      <div style="width:100%;max-width:300px">
        <input type="password" class="form-inp" id="pass-inp" placeholder="••••••••••"
          style="text-align:center;letter-spacing:4px;margin-bottom:10px"
          onkeydown="if(event.key==='Enter')doLogin()">
        <button class="btn-primary" onclick="doLogin()">ലോഗിൻ ചെയ്യുക</button>
        <div class="err-txt" id="pass-err"></div>
      </div>
    </div>`;}

function doLogin(){
  if(document.getElementById('pass-inp').value===ADMIN_PASS){adminIn=true;renderPanel();}
  else document.getElementById('pass-err').textContent='❌ തെറ്റായ പാസ്‌വേഡ്';
}

function renderPanel(){
  document.getElementById('admin-root').innerHTML=`
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:center">
      <div><div class="page-title">അഡ്മിൻ</div><div class="page-sub">Firebase ലൈവ് ഡേറ്റ</div></div>
      <button onclick="doLogout()" style="background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.3);color:#E74C3C;padding:6px 12px;border-radius:8px;font-family:inherit;font-size:12px;cursor:pointer">ലോഗൗട്ട്</button>
    </div>
    <div class="form-wrap">
      <div id="edit-banner" class="edit-banner" style="display:none">
        ✏️ <span>എഡിറ്റ് മോഡ്</span>
        <button onclick="cancelEdit()" style="background:none;border:none;color:var(--red);font-family:inherit;font-size:12px;cursor:pointer">❌ റദ്ദ്</button>
      </div>
      <div class="form-group"><label class="form-lbl">പേര് *</label><input type="text" class="form-inp" id="f-name" placeholder="ഉദാ: രാജൻ ഇലക്ട്രിക്കൽ"></div>
      <div class="form-group"><label class="form-lbl">ഫോൺ നമ്പർ *</label><input type="tel" class="form-inp" id="f-phone" placeholder="9400000000"></div>
      <div class="form-group"><label class="form-lbl">വിഭാഗം *</label>
        <select class="form-sel" id="f-cat">${CATS.map(c=>`<option value="${c.id}">${c.icon} ${c.name}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-lbl">പ്രദേശം</label><input type="text" class="form-inp" id="f-area" placeholder="ഉദാ: മറവഞ്ചേരി"></div>
      <div class="form-group"><label class="form-lbl">വിവരണം</label><input type="text" class="form-inp" id="f-desc" placeholder="ഉദാ: 10 വർഷം പരിചയം"></div>
      <div class="form-group"><label class="form-lbl">സമയം <span style="font-size:10px;color:var(--muted)">(കടകൾക്ക്)</span></label><input type="text" class="form-inp" id="f-timing" placeholder="ഉദാ: 8AM – 9PM"></div>
      <button class="btn-primary" id="save-btn" onclick="saveEntry()">+ Firebase-ൽ ചേർക്കുക</button>
      <div style="height:16px"></div>
    </div>
    <div class="div"></div>
    <div class="sec-title">ചേർത്ത ലിസ്റ്റിംഗ് (<span id="admin-count">${entries.length}</span>)</div>
    <div id="admin-list"></div>`;
  renderAdminList();
}

function renderAdminList(){
  const el=document.getElementById('admin-list');if(!el)return;
  const cnt=document.getElementById('admin-count');if(cnt)cnt.textContent=entries.length;
  if(!entries.length){el.innerHTML='<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">ഒന്നും ചേർത്തിട്ടില്ല</div></div>';return;}
  el.innerHTML=entries.map(e=>{
    const cat=CATS.find(c=>c.id===e.cat);
    const avg=avgRating(e),cnt2=(e.ratings||[]).length;
    return`<div class="card" style="border-left-color:${cat?.color||'#666'}">
      <div class="card-row">
        <div class="card-body">
          <div class="card-name">${cat?.icon||''} ${e.name}</div>
          <div class="card-meta">${cat?.name||''} · ${e.phone}</div>
          ${e.area?`<div style="font-size:11px;color:#556;margin-top:2px">${e.area}</div>`:''}
          ${avg>0?`<div style="font-size:11px;color:var(--gold);margin-top:3px">⭐ ${avg.toFixed(1)} (${cnt2})</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <button class="btn-sm btn-edit" onclick="editEntry('${e.id}')">✏️</button>
          <button class="btn-sm btn-del"  onclick="delEntry('${e.id}')">🗑️</button>
        </div>
      </div>
    </div>`;}).join('');
}

// ══════════════════════════════════════════
//  ADMIN CRUD → Firestore
// ══════════════════════════════════════════
async function saveEntry(){
  const name=document.getElementById('f-name').value.trim();
  const phone=document.getElementById('f-phone').value.trim();
  const cat=document.getElementById('f-cat').value;
  const area=document.getElementById('f-area').value.trim();
  const desc=document.getElementById('f-desc').value.trim();
  const timing=document.getElementById('f-timing').value.trim();
  if(!name||!phone){toast('⚠️ പേരും ഫോണും നൽകണം');return;}
  const btn=document.getElementById('save-btn');
  btn.textContent='⏳ സേവ് ചെയ്യുന്നു...';btn.disabled=true;
  try{
    if(editId){
      await COL.doc(editId).update({name,phone,cat,area,desc,timing,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
      toast('✅ Firebase-ൽ അപ്ഡേറ്റ് ചെയ്തു');cancelEdit();
    }else{
      await COL.add({name,phone,cat,area,desc,timing,ratings:[],createdAt:firebase.firestore.FieldValue.serverTimestamp()});
      toast('✅ Firebase-ൽ ചേർത്തു! എല്ലാർക്കും കാണാം');
    }
    clearForm();
  }catch(e){toast('❌ Firebase പിശക്');console.error(e);}
  btn.textContent=editId?'✅ അപ്ഡേറ്റ് ചെയ്യുക':'+ Firebase-ൽ ചേർക്കുക';btn.disabled=false;
}

function editEntry(id){
  const e=entries.find(en=>en.id===id);if(!e)return;
  editId=id;
  ['name','phone','cat','area','desc','timing'].forEach(f=>{
    const el=document.getElementById('f-'+f);if(el)el.value=e[f]||'';
  });
  document.getElementById('edit-banner').style.display='flex';
  document.getElementById('save-btn').textContent='✅ അപ്ഡേറ്റ് ചെയ്യുക';
  window.scrollTo({top:0,behavior:'smooth'});
}

function cancelEdit(){
  editId=null;
  document.getElementById('edit-banner').style.display='none';
  document.getElementById('save-btn').textContent='+ Firebase-ൽ ചേർക്കുക';
  clearForm();
}

function clearForm(){
  ['f-name','f-phone','f-area','f-desc','f-timing'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
}

async function delEntry(id){
  if(!confirm('ഈ ലിസ്റ്റിംഗ് ഡിലീറ്റ് ചെയ്യണോ?'))return;
  try{await COL.doc(id).delete();toast('🗑️ Firebase-ൽ നിന്ന് ഡിലീറ്റ് ചെയ്തു');}
  catch(e){toast('❌ Firebase പിശക്');console.error(e);}
}

function doLogout(){adminIn=false;renderLock();}

// ══════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════
function toast(msg){
  const el=document.createElement('div');el.className='toast';el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),2600);
}
