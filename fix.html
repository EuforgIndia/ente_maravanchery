<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebView Test</title>
    <style>
        body { font-family: Arial; padding: 15px; background: #0a0a0a; color: white; }
        button { padding: 12px; margin: 5px 0; width: 100%; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
        .wa { background: #25D366; color: white; }
        .test { background: #3498DB; color: white; }
        .bad { background: #E74C3C; color: white; }
        .status { background: #1a1a1a; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 12px; margin-top: 15px; }
    </style>
</head>
<body>
    <h3>📱 WhatsApp Test</h3>
    
    <button class="wa" onclick="sendCmd('wa:917594993481')">✅ Valid: wa:917594993481</button>
    <button class="test" onclick="sendCmd('wa:917204880242')">✅ Valid: wa:917204880242</button>
    <button class="bad" onclick="sendCmd('wrong:917594993481')">❌ Invalid: wrong:917594993481</button>
    <button class="test" onclick="sendCmd('test:string')">🧪 Test: test:string</button>
    
    <div class="status" id="status">Ready...</div>

    <script>
        function sendCmd(cmd) {
            document.getElementById('status').innerHTML = '📤 Sending: "' + cmd + '"';
            
            if (window.Kodular) {
                window.Kodular.setWebViewString(cmd);
                document.getElementById('status').innerHTML += '<br>✅ Sent to Kodular';
            } else {
                document.getElementById('status').innerHTML += '<br>⚠️ Browser mode (no Kodular)';
                if (cmd.startsWith('wa:')) {
                    var phone = cmd.replace('wa:', '');
                    window.open('https://wa.me/' + phone, '_blank');
                }
            }
        }
        
        // Connection check
        window.onload = function() {
            if (window.Kodular) {
                document.getElementById('status').innerHTML = '✅ Connected to Kodular';
            } else {
                document.getElementById('status').innerHTML = '🌐 Browser mode - open in Kodular WebView';
            }
        };
    </script>
</body>
</html>
