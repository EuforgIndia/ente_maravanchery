<!DOCTYPE html>
<html lang="ml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- ██ SECURITY HEADERS ██ -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https:; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com; font-src https://fonts.gstatic.com; frame-ancestors 'none';">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="no-referrer">
  <title>എന്റെ മറവഞ്ചേരി</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Malayalam:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#07111A;--bg2:#0D1E2C;--bg3:#122436;--gold:#F5A623;--green:#2ECC71;--blue:#3498DB;--red:#E74C3C;--purple:#8B5CF6;--text:#ECF0F1;--muted:#7F8C8D;--border:rgba(255,255,255,.07);--r:16px;--nh:68px;}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%}
    body{font-family:'Noto Sans Malayalam','Segoe UI',sans-serif;background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;overflow-x:hidden;min-height:100vh}
    .screen{display:none;padding-bottom:calc(var(--nh) + 10px);min-height:100vh}
    .screen.active{display:block}
    .bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg2);border-top:1px solid var(--border);display:flex;height:var(--nh);z-index:100}
    .nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--muted);font-family:inherit;cursor:pointer;font-size:9px;padding:6px 0;transition:color .2s;position:relative}
    .nb.on{color:var(--gold)}
    .nb.on::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:36px;height:3px;background:var(--gold);border-radius:0 0 4px 4px}
    .ni{font-size:20px;line-height:1}
    .ph{padding:48px 20px 16px;background:linear-gradient(180deg,var(--bg2),transparent);position:sticky;top:0;z-index:10;backdrop-filter:blur(10px)}
    .pt{font-size:24px;font-weight:900}.ps{font-size:12px;color:var(--muted);margin-top:2px}
    .sw{position:relative;padding:0 16px 14px}
    .si{position:absolute;left:28px;top:50%;transform:translateY(-58%);font-size:15px;pointer-events:none;color:var(--muted)}
    .sb{width:100%;padding:11px 14px 11px 42px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .2s}
    .sb:focus{border-color:var(--gold)}.sb::placeholder{color:var(--muted)}
    .cg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 16px 4px}
    .cc{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:14px 6px 12px;text-align:center;cursor:pointer;transition:transform .15s}
    .cc:active{transform:scale(.94)}
    .card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin:0 14px 10px;border-left-width:3px}
    .cr{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
    .cb{flex:1;min-width:0}
    .cn{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cm{font-size:12px;color:var(--muted);margin-top:3px}
    .cbtn{background:rgba(46,204,113,.13);border:1px solid rgba(46,204,113,.3);color:var(--green);border-radius:10px;padding:8px 12px;font-size:12px;font-family:inherit;cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
    .tr{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);margin-top:5px}
    .tabs{display:flex;gap:8px;padding:0 16px 14px;overflow-x:auto;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tbn{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-family:inherit;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
    .tbn.on{background:var(--gold);color:#000;border-color:var(--gold);font-weight:800}
    .btabs{display:flex;gap:8px;padding:0 16px 14px}
    .btab{flex:1;padding:10px 4px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s;line-height:1.5}
    .tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 14px 20px}
    .tc{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px 4px;text-align:center}
    .tc.past{opacity:.25}.tc.next{border-width:1.5px}
    .tv{font-size:17px;font-weight:800;font-family:monospace;letter-spacing:-.5px}
    .tap{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:1px;font-family:monospace}
    .ndot{width:6px;height:6px;border-radius:50%;margin:0 auto 4px}
    .nbanner{margin:0 14px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
    .nlbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;font-family:monospace}
    .nt{font-size:30px;font-weight:900;font-family:monospace;letter-spacing:-1px}
    .mbox{border-radius:10px;padding:8px 14px;text-align:center}
    .mv{font-size:24px;font-weight:900;font-family:monospace}
    .ml{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:1px}
    .lkwrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:24px;text-align:center}
    .fwrap{padding:0 16px}
    .fg{margin-bottom:13px}
    .fl{font-size:12px;color:var(--muted);margin-bottom:5px;display:block;font-weight:600}
    .fi,.fsl,.fta{width:100%;padding:11px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .2s}
    .fi:focus,.fsl:focus,.fta:focus{border-color:var(--gold)}
    .fsl option{background:#122436}
    .fta{resize:vertical;min-height:90px;line-height:1.5}
    .bprim{width:100%;padding:13px;background:var(--gold);color:#000;border:none;border-radius:12px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;transition:opacity .2s}
    .bprim:disabled{opacity:.5;cursor:not-allowed}
    .bsm{padding:6px 10px;border-radius:8px;font-family:inherit;font-size:12px;cursor:pointer;border:1px solid transparent}
    .bedit{background:rgba(52,152,219,.13);border-color:rgba(52,152,219,.3);color:var(--blue)}
    .bdel{background:rgba(231,76,60,.13);border-color:rgba(231,76,60,.3);color:var(--red)}
    .ebanner{background:rgba(52,152,219,.1);border:1px solid rgba(52,152,219,.3);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--blue);display:flex;justify-content:space-between;align-items:center}
    .hero{padding:52px 20px 18px;background:linear-gradient(160deg,#0D2035,#07111A);position:relative;overflow:hidden}
    .hero::before{content:'🌴';position:absolute;right:-10px;bottom:-10px;font-size:100px;opacity:.06;transform:rotate(-10deg);pointer-events:none}
    .htitle{font-size:27px;font-weight:900;color:var(--gold);line-height:1.2}
    .hsub{font-size:12px;color:var(--muted);margin-top:3px}
    .srow{display:flex;gap:8px;margin-top:14px}
    .sbox{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px 8px;text-align:center}
    .sv{font-size:22px;font-weight:900;color:var(--gold);font-family:monospace}
    .sl{font-size:10px;color:var(--muted);margin-top:1px}
    .stitle{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:14px 16px 10px}
    .empty{text-align:center;padding:40px 20px;color:var(--muted)}
    .clk{font-size:13px;font-family:monospace;color:var(--muted);letter-spacing:1px}
    .divider{height:1px;background:var(--border);margin:2px 14px 10px}
    .sdot{width:7px;height:7px;border-radius:50%;display:inline-block;background:var(--green);box-shadow:0 0 6px var(--green)}
    .sdot.off{background:var(--muted);box-shadow:none}
    .xtags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
    .xtag{display:inline-flex;align-items:center;gap:3px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:3px 9px;font-size:11px;color:#b0bec5;white-space:nowrap}
    #extra-fields .fg{margin-bottom:13px}
    #extra-fields{transition:all .2s}
    .detail-panel{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
    .detail-panel.open{display:block}
    .detail-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px;font-size:12px}
    .detail-lbl{color:var(--muted);min-width:80px;flex-shrink:0;font-size:11px}
    .detail-val{color:var(--text);font-weight:600;flex:1}
    .toggle-btn{width:100%;margin-top:8px;padding:6px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:inherit;font-size:11px;cursor:pointer;text-align:center;transition:all .2s}
    .toggle-btn:active{background:rgba(255,255,255,.08)}
    .phone-row{display:flex;align-items:center;gap:6px;margin-top:4px;font-size:13px;font-weight:700;color:var(--green);font-family:monospace;letter-spacing:.5px}
    /* Blood donor */
    .bg-filter{display:flex;gap:6px;padding:0 16px 14px;flex-wrap:wrap}
    .bgtag{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
    .bgtag.on{color:#fff;border-color:var(--red);background:var(--red)}
    .donor-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin:0 14px 10px;border-left:3px solid var(--red)}
    .blood-badge{display:inline-flex;align-items:center;justify-content:center;width:46px;height:46px;border-radius:50%;background:rgba(231,76,60,.15);border:2px solid rgba(231,76,60,.4);font-size:15px;font-weight:900;color:var(--red);flex-shrink:0;font-family:monospace}
    .donor-name{font-size:15px;font-weight:700}
    .donor-meta{font-size:11px;color:var(--muted);margin-top:2px}
    .donor-phone{font-size:13px;font-weight:700;color:var(--green);font-family:monospace;margin-top:5px}
    .blood-hero{margin:0 14px 14px;background:linear-gradient(135deg,rgba(231,76,60,.15),rgba(231,76,60,.05));border:1px solid rgba(231,76,60,.25);border-radius:16px;padding:16px}
    .bg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:12px}
    .bg-stat{background:rgba(0,0,0,.2);border:1px solid rgba(231,76,60,.2);border-radius:10px;padding:6px 4px;text-align:center}
    /* Announcements */
    .ann-card{background:var(--bg3);border:1px solid rgba(139,92,246,.25);border-radius:var(--r);padding:16px;margin:0 14px 12px;border-left:4px solid var(--purple);position:relative}
    .ann-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.3);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;color:var(--purple);margin-bottom:8px;letter-spacing:.5px}
    .ann-title{font-size:16px;font-weight:800;color:var(--text);line-height:1.3;margin-bottom:6px}
    .ann-body{font-size:13px;color:#b0bec5;line-height:1.6;white-space:pre-wrap;word-break:break-word}
    .ann-meta{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:11px;color:var(--muted);flex-wrap:wrap}
    .ann-author{font-weight:700;color:var(--text)}
    .ann-new{position:absolute;top:12px;right:12px;background:var(--green);color:#000;font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;letter-spacing:.5px}
    .ann-hero{margin:0 14px 16px;background:linear-gradient(135deg,rgba(139,92,246,.15),rgba(139,92,246,.05));border:1px solid rgba(139,92,246,.25);border-radius:16px;padding:16px;display:flex;justify-content:space-between;align-items:center}
    .ann-filter{display:flex;gap:6px;padding:0 16px 14px;flex-wrap:wrap;overflow-x:auto;scrollbar-width:none}
    .ann-filter::-webkit-scrollbar{display:none}
    .aftag{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
    .aftag.on{color:#000;border-color:var(--purple);background:var(--purple)}
    /* Toast */
    .toast{position:fixed;bottom:calc(var(--nh) + 14px);left:50%;transform:translateX(-50%);padding:9px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;white-space:nowrap;pointer-events:none;animation:tin .3s ease}
    .toast.ok{background:#2ECC71;color:#000}.toast.err{background:#E74C3C;color:#fff}
    @keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    .spin{display:inline-block;width:18px;height:18px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle}
    @keyframes sp{to{transform:rotate(360deg)}}
    /* Security UI */
    .lockout-bar{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);border-radius:10px;padding:10px 14px;margin-top:10px;font-size:12px;color:var(--red);text-align:center}
    .session-warn{position:fixed;top:8px;left:50%;transform:translateX(-50%);background:rgba(245,166,35,.95);color:#000;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:9999;display:none;pointer-events:none}
    /* Contact links */
    .contact-link{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;padding:11px 16px;border-radius:12px;text-decoration:none;font-family:monospace;font-size:13px;font-weight:700;transition:opacity .2s}
    .contact-link:active{opacity:.7}
    .contact-wa{background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.3);color:#25D366}
    .contact-call{background:rgba(52,152,219,.08);border:1px solid rgba(52,152,219,.25);color:var(--blue)}
    .contact-mail{background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.25);color:var(--purple)}
  </style>
</head>

<!-- DIRECTORY -->

</div>

<!-- BUS -->

  <div id="nba"></div>

<!-- BLOOD -->

async function sha256(msg){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return [...new Uint8Array(buf)].map(x=>x.toString(16).padStart(2,'0')).join('');
}

const RL_KEY='_em_rl', MAX_TRIES=5, LOCKOUT_MS=15*60*1000;
function rlGet(){try{return JSON.parse(localStorage.getItem(RL_KEY))||{count:0,lockUntil:0};}catch{return{count:0,lockUntil:0};}}
function rlSet(d){localStorage.setItem(RL_KEY,JSON.stringify(d));}
function rlReset(){localStorage.removeItem(RL_KEY);}
function isLocked(){
  const d=rlGet();
  if(d.lockUntil&&Date.now()<d.lockUntil)return d.lockUntil;
  if(d.lockUntil&&Date.now()>=d.lockUntil)rlReset();
  return false;
}
function rlFail(){const d=rlGet();d.count=(d.count||0)+1;if(d.count>=MAX_TRIES)d.lockUntil=Date.now()+LOCKOUT_MS;rlSet(d);return d;}

const SESSION_MS=2*60*60*1000, WARN_MS=5*60*1000;

function startSession(){

  warnTimer=setTimeout(()=>{document.getElementById('sess-warn').style.display='block';},SESSION_MS-WARN_MS);

function esc(s){
  return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/\//g,'&#x2F;');
}

function safePhone(p){return /^[\d\s+\-()]{7,15}$/.test(p||'')?p:'';}

function timeAgo(ts){
  if(!ts)return '';
  const d=ts.toDate?ts.toDate():new Date(ts);
  const diff=Math.floor((Date.now()-d)/1000);
  if(diff<60)return 'ഇപ്പോൾ';
  if(diff<3600)return Math.floor(diff/60)+' മിനിറ്റ് മുൻപ്';
  if(diff<86400)return Math.floor(diff/3600)+' മണിക്കൂർ മുൻപ്';
  if(diff<604800)return Math.floor(diff/86400)+' ദിവസം മുൻപ്';
  return d.toLocaleDateString('ml-IN',{day:'numeric',month:'short'});
}
function isNew(ts){if(!ts)return false;const d=ts.toDate?ts.toDate():new Date(ts);return(Date.now()-d)<86400000*2;}

async function doLogin(){
  const lockUntil=isLocked();
  if(lockUntil){const mins=Math.ceil((lockUntil-Date.now())/60000);document.getElementById('perr').textContent=`🔒 ${mins} മിനിറ്റ് കഴിഞ്ഞ് ശ്രമിക്കുക`;return;}
  const btn=document.getElementById('lbtn');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  try{
    const entered=document.getElementById('pinp').value;
    if(!entered){document.getElementById('perr').textContent='പാസ്‌വേഡ് നൽകുക';btn.disabled=false;btn.textContent='ലോഗിൻ ചെയ്യുക';return;}
    const hash=await sha256(entered);
    let diff=0;
    const a=hash.padEnd(64,'0'),b=PASS_HASH.padEnd(64,'0');
    for(let i=0;i<64;i++)diff|=a.charCodeAt(i)^b.charCodeAt(i);
    if(diff===0){
      rlReset();adminIn=true;startSession();renderPanel();
    } else {
      const d=rlFail();
      const rem=MAX_TRIES-d.count;
      if(d.lockUntil){document.getElementById('perr').textContent='🔒 15 മിനിറ്റ് ലോക്ക് ആയി';renderLock();}
      else{document.getElementById('perr').textContent=`❌ തെറ്റായ പാസ്‌വേഡ് — ${rem} ശ്രമം ബാക്കി`;btn.disabled=false;btn.textContent='ലോഗിൻ ചെയ്യുക';}
    }
  }catch{document.getElementById('perr').textContent='❌ ലോഗിൻ പരാജയം';btn.disabled=false;btn.textContent='ലോഗിൻ ചെയ്യുക';}
}

    ${fields.map(f=>`<div class="fg"><label class="fl">${esc(f.label)}</label>
      ${f.type==='select'
        ?`<select class="fsl" id="ex-${esc(f.id)}"><option value="">— തിരഞ്ഞെടുക്കുക —</option>${f.options.map(o=>`<option value="${esc(o)}" ${data[f.id]===o?'selected':''}>${esc(o)}</option>`).join('')}</select>`
        :`<input type="text" class="fi" id="ex-${esc(f.id)}" placeholder="${esc(f.placeholder||'')}" value="${esc(data[f.id]||'')}" maxlength="120">`}
    </div>`).join('')}</div>`;
}

function renderAList(){
  const el=document.getElementById('alist'),tl=document.getElementById('altitle');if(!el)return;
  if(tl)tl.textContent=`ചേർത്ത ലിസ്റ്റിംഗ് (${entries.length})`;
  if(!entries.length){el.innerHTML='<div class="empty"><div style="font-size:32px">📋</div><div style="font-size:13px;margin-top:6px">ഒന്നും ചേർത്തിട്ടില്ല</div></div>';return;}
  el.innerHTML=entries.map(e=>{const c=CATS.find(x=>x.id===e.cat);return `<div class="card" style="border-left-color:${c?.col||'#666'}">
    <div class="cr"><div class="cb"><div class="cn">${c?.icon||''} ${esc(e.name)}</div><div class="cm">${esc(c?.name||'')} · ${esc(e.phone)}</div>${e.area?`<div style="font-size:11px;color:#556;margin-top:2px">${esc(e.area)}</div>`:''}</div>
    <div style="display:flex;flex-direction:column;gap:6px"><button class="bsm bedit" data-id="${esc(e.id)}">✏️ തിരുത്ത്</button><button class="bsm bdel" data-id="${esc(e.id)}">🗑️ ഡിലീറ്റ്</button></div></div></div>`;}).join('');
  el.querySelectorAll('.bedit').forEach(btn=>btn.onclick=()=>editEntry(btn.dataset.id));
  el.querySelectorAll('.bdel').forEach(btn=>btn.onclick=()=>delEntry(btn.dataset.id));
}

async function saveEntry(){
  const name=document.getElementById('fn').value.trim(),phone=document.getElementById('fp').value.trim();
  const cat=document.getElementById('fc').value,area=document.getElementById('fa').value.trim();
  const desc=document.getElementById('fd').value.trim(),timing=document.getElementById('ft2').value.trim();
  if(!name||!phone){toast('⚠️ പേരും ഫോണും നൽകണം','err');return;}
  if(!/^[\d\s+\-()]{7,15}$/.test(phone)){toast('⚠️ ഫോൺ നമ്പർ ശരിയല്ല (7-15 ഡിജിറ്റ്)','err');return;}
  if(!CAT_IDS.has(cat)){toast('⚠️ വിഭാഗം ശരിയല്ല','err');return;}
  const extraData={};(CAT_EXTRA[cat]||[]).forEach(f=>{const el=document.getElementById('ex-'+f.id);if(el&&el.value.trim())extraData[f.id]=el.value.trim();});
  const btn=document.getElementById('sbtn');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  try{
    if(editId){await updateDoc(doc(db,'entries',editId),{name,phone,cat,area,desc,timing,...extraData});toast('✅ അപ്ഡേറ്റ് ചെയ്തു','ok');cancelEdit();}
    else{await addDoc(collection(db,'entries'),{name,phone,cat,area,desc,timing,...extraData,createdAt:serverTimestamp()});toast('✅ ചേർത്തു','ok');clearForm();}
  }catch(e){toast('❌ '+e.message,'err');}
  btn.disabled=false;btn.textContent=editId?'✅ അപ്ഡേറ്റ് ചെയ്യുക':'+ ചേർക്കുക';
}
function editEntry(id){
  const e=entries.find(x=>x.id===id);if(!e)return;editId=id;
  document.getElementById('fn').value=e.name||'';document.getElementById('fp').value=e.phone||'';
  document.getElementById('fc').value=e.cat||'store';document.getElementById('fa').value=e.area||'';
  document.getElementById('fd').value=e.desc||'';document.getElementById('ft2').value=e.timing||'';
  renderExtraFields(e);document.getElementById('ebanner').style.display='flex';
  document.getElementById('sbtn').textContent='✅ അപ്ഡേറ്റ് ചെയ്യുക';window.scrollTo({top:0,behavior:'smooth'});
}
function cancelEdit(){editId=null;document.getElementById('ebanner').style.display='none';document.getElementById('sbtn').textContent='+ ചേർക്കുക';clearForm();}
function clearForm(){['fn','fp','fa','fd','ft2'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});document.getElementById('fc').value='store';renderExtraFields();}
async function delEntry(id){if(!confirm('ഈ ലിസ്റ്റിംഗ് ഡിലീറ്റ് ചെയ്യണോ?'))return;try{await deleteDoc(doc(db,'entries',id));toast('🗑️ ഡിലീറ്റ് ചെയ്തു','ok');}catch{toast('❌ ഡിലീറ്റ് ചെയ്യാൻ കഴിഞ്ഞില്ല','err');}}

async function saveDonor(){
  const name=document.getElementById('dn').value.trim(),phone=document.getElementById('dph').value.trim();
  const bloodGroup=document.getElementById('dbg').value,area=document.getElementById('dar').value.trim();
  const age=document.getElementById('dage').value.trim(),note=document.getElementById('dnote').value.trim();
  if(!name||!phone||!bloodGroup){toast('⚠️ പേര്, ഫോൺ, ഗ്രൂപ്പ് നൽകണം','err');return;}
  if(!/^[\d\s+\-()]{7,15}$/.test(phone)){toast('⚠️ ഫോൺ നമ്പർ ശരിയല്ല','err');return;}
  if(!BLOOD_GROUPS.includes(bloodGroup)){toast('⚠️ രക്തഗ്രൂപ്പ് ശരിയല്ല','err');return;}
  const btn=document.getElementById('dsbtn');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  try{
    if(donorEditId){await updateDoc(doc(db,'donors',donorEditId),{name,phone,bloodGroup,area,age,note});toast('✅ ഡോണർ അപ്ഡേറ്റ് ചെയ്തു','ok');cancelDonorEdit();}
    else{await addDoc(collection(db,'donors'),{name,phone,bloodGroup,area,age,note,createdAt:serverTimestamp()});toast('🩸 ഡോണർ ചേർത്തു!','ok');clearDonorForm();}
  }catch(e){toast('❌ '+e.message,'err');}
  btn.disabled=false;btn.innerHTML=donorEditId?'✅ ഡോണർ അപ്ഡേറ്റ്':'🩸 ഡോണർ ചേർക്കുക';
}
function editDonor(id){
  const d=donors.find(x=>x.id===id);if(!d)return;donorEditId=id;
  document.getElementById('dn').value=d.name||'';document.getElementById('dph').value=d.phone||'';
  document.getElementById('dbg').value=d.bloodGroup||'';document.getElementById('dar').value=d.area||'';
  document.getElementById('dage').value=d.age||'';document.getElementById('dnote').value=d.note||'';
  document.getElementById('donor-ebanner').style.display='flex';
  document.getElementById('dsbtn').textContent='✅ ഡോണർ അപ്ഡേറ്റ്';document.getElementById('dsbtn').style.background='var(--blue)';
  window.scrollTo({top:0,behavior:'smooth'});
}
function cancelDonorEdit(){donorEditId=null;document.getElementById('donor-ebanner').style.display='none';document.getElementById('dsbtn').textContent='🩸 ഡോണർ ചേർക്കുക';document.getElementById('dsbtn').style.background='var(--red)';clearDonorForm();}
function clearDonorForm(){['dn','dph','dar','dage','dnote'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});const bg=document.getElementById('dbg');if(bg)bg.value='';}
async function delDonor(id){if(!confirm('ഈ ഡോണർ ഡിലീറ്റ് ചെയ്യണോ?'))return;try{await deleteDoc(doc(db,'donors',id));toast('🗑️ ഡിലീറ്റ് ചെയ്തു','ok');}catch{toast('❌ ഡിലീറ്റ് ചെയ്യാൻ കഴിഞ്ഞില്ല','err');}}

async function saveAnn(){
  const title=document.getElementById('an-title').value.trim();
  const body=document.getElementById('an-body').value.trim();
  const author=document.getElementById('an-author').value.trim();
  const designation=document.getElementById('an-desig').value.trim();
  const category=document.getElementById('an-cat').value;
  if(!title||!body||!author){toast('⚠️ തലക്കെട്ട്, സന്ദേശം, പേര് നൽകണം','err');return;}
  if(!ANN_CAT_IDS.has(category)){toast('⚠️ വിഭാഗം ശരിയല്ല','err');return;}
  const btn=document.getElementById('an-sbtn');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  try{
    if(annEditId){
      await updateDoc(doc(db,'announcements',annEditId),{title,body,author,designation,category});
      toast('✅ അറിയിപ്പ് അപ്ഡേറ്റ് ചെയ്തു','ok');cancelAnnEdit();
    } else {
      await addDoc(collection(db,'announcements'),{title,body,author,designation,category,createdAt:serverTimestamp()});
      toast('📢 അറിയിപ്പ് ചേർത്തു!','ok');clearAnnForm();
    }
  }catch(e){toast('❌ '+e.message,'err');}
  btn.disabled=false;btn.innerHTML=annEditId?'✅ അറിയിപ്പ് അപ്ഡേറ്റ്':'📢 അറിയിപ്പ് ചേർക്കുക';
}
function editAnn(id){
  const a=announcements.find(x=>x.id===id);if(!a)return;annEditId=id;
  document.getElementById('an-title').value=a.title||'';
  document.getElementById('an-body').value=a.body||'';
  document.getElementById('an-author').value=a.author||'';
  document.getElementById('an-desig').value=a.designation||'';
  document.getElementById('an-cat').value=a.category||'other';
  document.getElementById('ann-ebanner').style.display='flex';
  document.getElementById('an-sbtn').textContent='✅ അറിയിപ്പ് അപ്ഡേറ്റ്';
  document.getElementById('an-sbtn').style.background='var(--blue)';
  window.scrollTo({top:0,behavior:'smooth'});
}
function cancelAnnEdit(){annEditId=null;document.getElementById('ann-ebanner').style.display='none';document.getElementById('an-sbtn').textContent='📢 അറിയിപ്പ് ചേർക്കുക';document.getElementById('an-sbtn').style.background='var(--purple)';clearAnnForm();}
function clearAnnForm(){['an-title','an-body','an-author','an-desig'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});const c=document.getElementById('an-cat');if(c)c.value='ward';}
async function delAnn(id){if(!confirm('ഈ അറിയിപ്പ് ഡിലീറ്റ് ചെയ്യണോ?'))return;try{await deleteDoc(doc(db,'announcements',id));toast('🗑️ ഡിലീറ്റ് ചെയ്തു','ok');}catch{toast('❌ ഡിലീറ്റ് ചെയ്യാൻ കഴിഞ്ഞില്ല','err');}}

function doLogout(){
  adminIn=false;clearTimeout(sessionTimer);clearTimeout(warnTimer);
  document.getElementById('sess-warn').style.display='none';
  renderLock();
}

function toast(msg,type='ok'){
  const el=document.createElement('div');el.className=`toast ${type}`;el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),2500);
}

document.getElementById('bnav').style.opacity='1';
document.getElementById('stats').innerHTML=
  `<div class="sbox"><div class="sv">…</div><div class="sl">ആകെ ലിസ്റ്റിംഗ്</div></div>
   <div class="sbox"><div class="sv">…</div><div class="sl">കാറ്റഗറി</div></div>`;
renderBus();
history.replaceState({page:'home'},'','#home');
